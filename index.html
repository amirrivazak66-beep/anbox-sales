.kpi-set-row input{padding:7px 9px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:12px;font-family:Tahoma,sans-serif;outline:none;width:100%}
.kpi-set-row input:focus{border-color:#2563EB}
.add-kpi-btn{padding:10px 16px;background:#16A34A;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Tahoma,sans-serif;margin-top:4px}
.del-kpi-btn{background:#FEF2F2;border:none;color:#DC2626;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:11px;font-family:Tahoma,sans-serif}
.col-hdr{font-size:10px;color:#94A3B8;text-align:center}
.realtime-banner{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:10px 14px;font-size:12px;color:#15803D;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.lead-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:11px;background:#fff;border-radius:12px;overflow:hidden}
.lead-table th{background:#F1F5F9;padding:10px;text-align:right;font-weight:700;color:#1B3A5C;border-bottom:1px solid #E2E8F0}
.lead-table td{padding:10px;border-bottom:1px solid #E2E8F0}
.lead-table tr:hover{background:#F8FAFC}
.inline-select{padding:6px;border:1px solid #2563EB;border-radius:6px;font-size:10px;width:100%;font-family:Tahoma}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.gauge-grid{grid-template-columns:repeat(2,1fr)}.metrics-grid{grid-template-columns:repeat(2,1fr)}.kpi-set-row{grid-template-columns:1fr 50px 60px 40px}}
</style>

<script>

const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

const LOGO_B64 = '/9j/4AAQSkZJRgABAQAAkACQAAD/4QECRXhpZgAATU0AKgAAAAgABwEOAAIAAAALAAAAYgESAAMAAAABAAEAAAEaAAUAAAABAAAAbgEbAAUAAAABAAAAdgEoAAMAAAABAAIAAAEyAAIAAAAUAAAAfodpAAQAAAABAAAAkgAAAABTY3JlZW5zaG90AAAAAACQAAAAAQAAAJAAAAABMjAyNjowNjoxNCAwMDoxODoxMwAABZADAAIAAAAUAAAA1JKGAAcAAAASAAAA6KABAAMAAAAB//8AAKACAAQAAAABAAAE4KADAAQAAAABAAACXAAAAAAyMDI2OjA2OjE0IDAwOjE4OjEzAEFTQ0lJAAAAU2NyZWVuc2hvdA==';

// TEAM & KPI DEFAULTS
const DEFAULT_EXPERTS = [
  {id:1,name:'مجتبی رنجبر'},

  {key:'panels',label:'پنل ساخته‌شده',icon:'🖥️',target:3},
  {key:'trainings',label:'آموزش',icon:'🎓',target:3},
  {key:'barcodes',label:'بارکد',icon:'📦',target:10},
];
const CHECK_ITEMS=[
  'لیست لیدهای امروز دریافت شد','گزارش دیروز بررسی شد','اهداف روز با مدیر هماهنگ شد',
  'تماس با تمام لیدهای امروز انجام شد','فالوآپ مشتریان دیروز انجام شد',
  'اطلاعات مشتریان تأییدشده دریافت شد','پنل‌های جدید ساخته و تحویل داده شد',
  'آموزش شارژ و ارسال به مشتریان انجام شد','بارکد سفارشات امروز صادر شد',
  'گزارش پایان روز در CRM ثبت شد'
];

// LEADS DEFAULT DROPDOWNS
const LEAD_DROPDOWNS = {
  lead_type: ['گرم', 'سرد'],
  lead_source: ['سرچ اینترنتی', 'تماس مشتری', 'بانک اطلاعاتی', 'دایره طلایی', 'پیامک تبلیغاتی', 'سوشیال مدیا'],
  industry: ['دارویی', 'بانک', 'فروشگاه اینترنتی', 'خودرویی', 'لوازم خانگی', 'سازمانی', 'لوازم آرایشی', 'لوازم آشپزخانه', 'لوازم جانبی', 'فروشگاه حضوری'],
  selection_reason: ['جغرافیای تحت پوشش', 'ارسال پستی دارد', 'حجم سفارش مناسب', 'سابقه خوب با شرکت', 'توصیه شده از منابع معتبر'],
  sales_stage: ['1. لیدسازی', '2. تماس اولیه', '3. ارسال نرخ نامه', '4. جلسه مذاکره', '5. ارسال پروپوزال', '6. عقد قرارداد'],
  anbox_fit: ['ارسال مرسوله روزانه', 'تناسب با SLA', 'تناسب با نرخ', 'ارسال ترکیبی', 'ارسال مرسولات کم حجم'],
  main_obstacle: ['عدم توافق نرخ', 'عدم توافق SLA', 'عدم توافق قراردادی', 'شکایت مشتری از خدمات', 'مانع ندارد'],
  next_action: ['ارسال پروپوزال', 'برقراری جلسه مذاکره', 'جلسه متقاعد سازی', 'ارسال درفت قرارداد', 'عقد قرارداد', 'عدم توافق'],
  sales_expert: ['امیرحسین ریواز', 'مجتبی رنجبر', 'ندا شریفی', 'سمن خوشکلام', 'پرستو احمدی'],
  lead_status: ['در حال پیگیری', 'عدم توافق', 'انحلال شرکت', 'در حال عقد قرارداد', 'در حال مذاکره', 'در حال تست']
};

// GLOBAL VARS
let CFG = {experts: DEFAULT_EXPERTS, fields: DEFAULT_FIELDS};
let REPORTS = {};
let LEADS = [];
let AE = null;
let currentPage = 'sel';

function tkey(){return new Date().toISOString().slice(0,10);}
function faDate(){return new Date().toLocaleDateString('fa-IR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function pct(v,t){return Math.min(100,Math.round((parseInt(v)||0)/t*100));}
function pColor(p){return p>=100?'#16A34A':p>=60?'#2563EB':p>=30?'#D97706':'#94A3B8';}

let toastT;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type==='err'?'err':'')+' show';
  clearTimeout(toastT);toastT=setTimeout(()=>el.className='toast',2500);
}

// SUPABASE
async function loadConfig(){
  try{
    const {data,error}=await db.from('config').select('*').eq('id',1).single();
    if(data && !error){
      CFG={
        experts: data.experts||DEFAULT_EXPERTS,
        fields:  data.fields||DEFAULT_FIELDS
      };
    } else {
      await db.from('config').upsert({id:1, experts:DEFAULT_EXPERTS, fields:DEFAULT_FIELDS});
    }
  }catch(e){console.log('config load error',e);}
}

async function saveConfig(){
  await db.from('config').upsert({id:1, experts:CFG.experts, fields:CFG.fields});
}

async function loadReports(){
  try{
    const {data,error}=await db.from('reports').select('*').eq('date',tkey());
    if(data) data.forEach(r=>{ REPORTS[r.eid+'_'+r.date]=r; });
  }catch(e){console.log('reports load',e);}
}

function getReport(eid){
  const k=eid+'_'+tkey();
  if(REPORTS[k]) return REPORTS[k];
  const blank={eid,date:tkey(),crm:false,notes:'',checklist:new Array(10).fill(false),savedAt:null};
  CFG.fields.forEach(f=>blank[f.key]='');
  return blank;
}

async function saveReport(eid){
  const r=getReport(eid);
  r.savedAt=new Date().toLocaleTimeString('fa-IR');
  REPORTS[eid+'_'+tkey()]=r;
  const payload={eid,date:tkey(),crm:r.crm,notes:r.notes,checklist:r.checklist,savedAt:r.savedAt};
  CFG.fields.forEach(f=>payload[f.key]=r[f.key]||'');
  await db.from('reports').upsert(payload, {onConflict:'eid,date'});
  return r;
}

async function updateField(eid, field, value){
  const r=getReport(eid);
  r[field]=value;
  REPORTS[eid+'_'+tkey()]=r;
  clearTimeout(window['dbT_'+eid]);
  window['dbT_'+eid]=setTimeout(async()=>{
    const payload={eid,date:tkey()};
    payload[field]=value;
    CFG.fields.forEach(f=>payload[f.key]=getReport(eid)[f.key]||'');
    payload.crm=getReport(eid).crm;
    payload.notes=getReport(eid).notes;
    payload.checklist=getReport(eid).checklist;

function downloadLeadTemplate(){
  const headers = ['نوع لید','مبدأ لید','نام شرکت','صنعت','دلیل انتخاب شرکت','شماره تماس','نام فرد تماس','سمت فرد تماس','مرحله فروش','تناسب با آن باکس','مانع اصلی','اقدام بعدی','کارشناس فروش','وضعیت لید'];
  const sampleData = [['گرم','سرچ اینترنتی','شرکت نمونه','بانک','جغرافیای تحت پوشش','09121234567','علی احمدی','مدیر انبار','2. تماس اولیه','ارسال مرسوله روزانه','مانع ندارد','برقراری جلسه مذاکره','امیرحسین ریواز','در حال مذاکره']];
  let csv = headers.join('\t') + '\n';
  sampleData.forEach(row=>csv+=row.join('\t')+'\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', 'نمونه_لیدها.csv');
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('نمونه دانلود شد');
}

async function importLeadsExcel(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(worksheet);
      let imported=0;
      json.forEach(row=>{
        if(row['نام شرکت'] && row['شماره تماس']){
          const lead={
            lead_type: row['نوع لید']||'سرد',
            lead_source: row['مبدأ لید']||'',
            company_name: row['نام شرکت'],
            industry: row['صنعت']||'',
            selection_reason: row['دلیل انتخاب شرکت']||'',
            phone: row['شماره تماس'],
            contact_name: row['نام فرد تماس']||'',
            contact_position: row['سمت فرد تماس']||'',
            sales_stage: row['مرحله فروش']||'1. لیدسازی',
            anbox_fit: row['تناسب با آن باکس']||'',
            main_obstacle: row['مانع اصلی']||'',
            next_action: row['اقدام بعدی']||'',
            sales_expert: row['کارشناس فروش']||'',
            lead_status: row['وضعیت لید']||'در حال پیگیری'
          };
          saveLead(lead);imported++;
        }
      });
      toast(`${imported} لید آپلود شد`);
      loadLeads();
      renderLeads();
      document.getElementById('xlFile').value='';
    }catch(err){
      toast('خطا در پردازش فایل','err');
    }
  };
  reader.readAsArrayBuffer(file);
}

  const el=document.getElementById('setExperts');
  let html='<div class="card"><div class="card-body"><label style="display:block;font-size:13px;color:#1B3A5C;margin-bottom:11px">افزودن کارشناس ('+CFG.experts.length+'/10)</label>'+
    '<div class="add-row"><input class="add-inp" id="newNm" placeholder="نام و نام خانوادگی" onkeydown="if(event.key===\'Enter\')addExp()">'+
    '<button class="add-sub" onclick="addExp()">+ افزودن</button></div></div></div>';
  CFG.experts.forEach(e=>{
    html+='<div class="si2" id="si_'+e.id+'"><span>👤 '+e.name+'</span>'+
      '<button class="be" onclick="stEdit('+e.id+')">ویرایش</button>'+
      '<button class="bd" onclick="delExp('+e.id+')">حذف</button></div>';
  });
  el.innerHTML=html;
}

function stEdit(eid){
  const e=CFG.experts.find(x=>x.id===eid),div=document.getElementById('si_'+eid);
  div.innerHTML='<input class="add-inp" id="ei_'+eid+'" value="'+e.name+'" style="flex:1" onkeydown="if(event.key===\'Enter\')doEdit('+eid+')">'+
    '<button class="be" onclick="doEdit('+eid+')">ذخیره</button>';
  document.getElementById('ei_'+eid).focus();
}

async function doEdit(eid){
  const v=document.getElementById('ei_'+eid).value.trim();if(!v)return;
  CFG.experts=CFG.experts.map(e=>e.id===eid?{...e,name:v}:e);
  await saveConfig();renderSetExp();toast('نام ویرایش شد');
}

async function addExp(){
  const nm=document.getElementById('newNm').value.trim();if(!nm)return;
  if(CFG.experts.length>=10){toast('حداکثر ۱۰ کارشناس','err');return;}
  CFG.experts.push({id:Date.now(),name:nm});
  await saveConfig();document.getElementById('newNm').value='';renderSetExp();toast(nm+' اضافه شد');
}

async function delExp(eid){
  CFG.experts=CFG.experts.filter(e=>e.id!==eid);
  await saveConfig();renderSetExp();toast('حذف شد');
}

function renderSetKpi(){
  const el=document.getElementById('setKpi');
  let html='<div class="card"><div class="card-head"><h3>تنظیم KPI</h3></div><div class="card-body">';
  CFG.fields.forEach((f,i)=>{
    html+='<div class="kpi-set-row">'+
      '<input id="kl_'+i+'" value="'+f.label+'" oninput="updKpi('+i+`,\'label\',this.value)">'+
      '<input id="ki_'+i+'" value="'+f.icon+'" style="text-align:center" oninput="updKpi('+i+`,\'icon\',this.value)">'+
      '<input type="number" id="kt_'+i+'" value="'+f.target+'" min="1" oninput="updKpi('+i+`,\'target\',this.value)">'+
      '<button class="del-kpi-btn" onclick="delKpi('+i+')">حذف</button></div>';
  });
  html+='<button class="add-kpi-btn" onclick="addKpi()">+ KPI جدید</button></div></div>';
  el.innerHTML=html;
}

async function updKpi(i,prop,val){
  if(prop==='target') CFG.fields[i].target=parseInt(val)||1;
  else CFG.fields[i][prop]=val;
  clearTimeout(window.kpiSaveT);
  window.kpiSaveT=setTimeout(()=>saveConfig(),800);
}

async function delKpi(i){
  if(CFG.fields.length<=1){toast('حداقل یک KPI','err');return;}
  CFG.fields.splice(i,1);await saveConfig();renderSetKpi();toast('حذف شد');
}

async function addKpi(){
  CFG.fields.push({key:'kpi_'+Date.now(),label:'KPI جدید',icon:'📌',target:5});
  await saveConfig();renderSetKpi();toast('اضافه شد');
}

function shareWA(){
  const url=window.location.href;
  const txt='داشبورد آن‌باکس 🚚\n'+url;
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

document.getElementById('hLogo').src='data:image/jpeg;base64,'+LOGO_B64;

        <div class="sel-hero"><h1>🚚 داشبورد یکپارچه آن‌باکس</h1><p id="selDate"></p></div>
        <div style="font-size:13px;color:#64748B;margin-bottom:11px;text-align:center">شما کدام کارشناس هستید؟</div>
        <div id="expList"></div>
        <button class="act-btn pri" onclick="gotoMgr()">📊 ورود مدیر</button>
        <button class="act-btn sec" onclick="gotoLeads()">📋 مدیریت لیدها</button>
        <button class="act-btn sec" onclick="gotoSet()">⚙️ تنظیمات</button>

        </div>

      <div class="tabs">

        <button class="tab-btn" id="btnS" onclick="swTeamTab('S')">📅 برنامه</button>
        <button class="tab-btn" id="btnC" onclick="swTeamTab('C')">✅ چک‌لیست</button>
        <button class="tab-btn" id="btnL" onclick="swTeamTab('L')">📋 لیدهای من</button>
      </div>
      <div id="tR" class="content"></div>

        <div id="setExperts"></div>

      </div>

  gotoSel();
}

init().catch(e=>{

  document.getElementById('app').innerHTML='<div class="loading"><div style="color:#DC2626">خطا در اتصال</div></div>';

</script>
