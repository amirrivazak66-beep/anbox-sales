<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد فروش | آن‌باکس</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,'Segoe UI',sans-serif;background:#F0F4F8;color:#1E293B;min-height:100vh}
.header{background:#fff;border-bottom:3px solid #2563EB;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.07);position:sticky;top:0;z-index:100}
.header-logo{height:44px;object-fit:contain}
.header-right{text-align:left}.htitle{font-size:13px;font-weight:700;color:#1B3A5C}.hdate{font-size:11px;color:#64748B}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22C55E;display:inline-block;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#16A34A;color:#fff;padding:10px 24px;border-radius:30px;z-index:9999;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);pointer-events:none;opacity:0;transition:opacity .3s}
.toast.err{background:#DC2626}.toast.show{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:4px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sel-wrap{max-width:480px;margin:32px auto;padding:0 16px}
.sel-hero{background:linear-gradient(135deg,#1B3A5C,#2563EB);color:#fff;border-radius:18px;padding:24px;text-align:center;margin-bottom:24px}
.sel-hero h1{font-size:20px;margin-bottom:4px}.sel-hero p{font-size:13px;opacity:.75}
.exp-btn{width:100%;padding:16px 20px;background:#fff;border:2px solid #E2E8F0;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;color:#1B3A5C;margin-bottom:10px;font-family:Tahoma,sans-serif;transition:border-color .2s}
.exp-btn:hover{border-color:#2563EB}
.ebadge{font-size:11px;padding:3px 10px;border-radius:20px;background:#F1F5F9;color:#64748B}
.ebadge.done{background:#DCFCE7;color:#16A34A}
.act-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:Tahoma,sans-serif}
.act-btn.pri{background:#1B3A5C;color:#fff}.act-btn.sec{background:#fff;color:#64748B;border:1.5px solid #E2E8F0}
.share-strip{background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:12px;padding:12px 16px;font-size:13px;color:#1E40AF;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.share-strip button{margin-right:auto;padding:7px 14px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;font-family:Tahoma,sans-serif}
.exp-header{background:linear-gradient(135deg,#1B3A5C,#2563EB);color:#fff;padding:14px 20px}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;margin-bottom:10px;font-family:Tahoma,sans-serif}
.back-btn.dark{background:#EFF6FF;color:#2563EB}
.exp-hrow{display:flex;justify-content:space-between;align-items:center}
.ck-badge{text-align:center;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 16px}
.ck-badge .num{font-size:18px;font-weight:700}.ck-badge .lbl{font-size:10px;opacity:.8}
.tabs{background:#fff;border-bottom:2px solid #E2E8F0;display:flex;position:sticky;top:67px;z-index:10}
.tab-btn{flex:1;padding:13px 6px;border:none;background:none;cursor:pointer;font-size:12px;color:#64748B;border-bottom:3px solid transparent;font-family:Tahoma,sans-serif;transition:all .2s}
.tab-btn.active{font-weight:700;color:#2563EB;border-bottom-color:#2563EB}
.content{max-width:700px;margin:0 auto;padding:18px 14px}
.card{background:#fff;border-radius:16px;border:1.5px solid #E2E8F0;overflow:hidden;margin-bottom:14px}
.card-head{padding:14px 20px;background:#EFF6FF;border-bottom:1px solid #E2E8F0}
.card-head h3{font-size:15px;color:#1B3A5C;font-weight:700}.card-head p{font-size:12px;color:#64748B;margin-top:2px}
.card-body{padding:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.ff label{display:block;font-size:11px;color:#64748B;margin-bottom:5px}
.ff input[type=number]{width:100%;padding:9px 11px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:15px;font-family:Tahoma,sans-serif;outline:none}
.ff input:focus{border-color:#2563EB}
.prow{display:flex;justify-content:space-between;font-size:11px;margin:4px 0 3px}
.bwrap{background:#E2E8F0;border-radius:99px;height:7px}
.bfill{height:7px;border-radius:99px;transition:width .4s,background .4s}
.crm-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;cursor:pointer;margin-bottom:14px;border:1.5px solid #E2E8F0;background:#F8FAFC;transition:all .2s}
.crm-row.done{background:#F0FDF4;border-color:#BBF7D0}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid #CBD5E1;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.cbox.on{background:#16A34A;border-color:#16A34A}
.notes-area{width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:Tahoma,sans-serif;resize:vertical;outline:none;margin-bottom:14px}
.notes-area:focus{border-color:#2563EB}
.save-btn{width:100%;padding:14px;background:#2563EB;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Tahoma,sans-serif}
.saved-msg{text-align:center;font-size:12px;color:#16A34A;margin-top:7px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.kpi-box{text-align:center;padding:11px 6px;background:#F8FAFC;border-radius:10px}
.kpi-box .ki{font-size:18px}.kpi-box .kv{font-size:20px;font-weight:700}.kpi-box .kl{font-size:9px;color:#64748B}
.sch-item{background:#fff;border-radius:14px;border:1.5px solid #E2E8F0;padding:13px 16px;display:flex;gap:13px;align-items:flex-start;margin-bottom:9px}
.si-icon{font-size:24px;min-width:34px;text-align:center}
.si-title{font-weight:700;font-size:13px;color:#1B3A5C}.si-time{font-size:11px;color:#2563EB;margin-top:2px}.si-desc{font-size:12px;color:#374151;margin-top:5px;line-height:1.6}
.ph{background:#fff;border-radius:14px;border:1.5px solid #E2E8F0;padding:15px 18px;margin-bottom:12px}
.ph-row{display:flex;justify-content:space-between;margin-bottom:9px}
.ci{display:flex;align-items:center;gap:13px;background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px 16px;cursor:pointer;margin-bottom:7px;transition:all .2s}
.ci.done{background:#F0FDF4;border-color:#BBF7D0}
.ci span{font-size:13px;color:#374151}.ci.done span{color:#16A34A;font-weight:600;text-decoration:line-through}
.success-box{margin-top:14px;background:#F0FDF4;border:2px solid #22C55E;border-radius:14px;padding:18px;text-align:center}
.mgr-header{background:linear-gradient(135deg,#1B3A5C,#2563EB);color:#fff;padding:14px 20px}
.mgr-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{text-align:center;background:rgba(255,255,255,.12);border-radius:12px;padding:9px 14px}
.stat-box .sv{font-size:20px;font-weight:700}.stat-box .sl{font-size:10px;opacity:.8}
.exp-card{background:#fff;border-radius:16px;border:1.5px solid #E2E8F0;overflow:hidden;margin-bottom:14px}
.ech{padding:13px 18px;background:#FAFBFC;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center}
.avatar{width:36px;height:36px;border-radius:50%;background:#1B3A5C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.en{font-weight:700;font-size:14px}.es{font-size:11px;color:#64748B;margin-top:1px}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.mc{padding:12px 14px;border-right:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0}
.mc:nth-child(3n){border-right:none}.mc:nth-child(n+4){border-bottom:none}
.ml{font-size:10px;color:#64748B;margin-bottom:3px}.mv{font-size:20px;font-weight:700}.mt{font-size:9px;color:#94A3B8}
.notes-strip{padding:9px 18px;border-top:1px solid #E2E8F0;background:#FFFBEB;font-size:12px;color:#374151}
.chart-wrap{background:#fff;border-radius:16px;border:1.5px solid #E2E8F0;padding:18px;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700;color:#1B3A5C;margin-bottom:14px}
.gauge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px}
.gauge-item{text-align:center}
.bar-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bcr-label{font-size:11px;color:#64748B;min-width:70px;text-align:right}
.bcr-bar{flex:1;background:#E2E8F0;border-radius:99px;height:20px;position:relative;overflow:hidden}
.bcr-fill{height:100%;border-radius:99px;transition:width .5s}
.bcr-val{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#fff;font-weight:700}
.bcr-pct{font-size:11px;font-weight:700;min-width:36px}
.set-wrap{max-width:520px;margin:0 auto;padding:18px 14px}
.add-row{display:flex;gap:8px;margin-bottom:14px}
.add-inp{flex:1;padding:10px 13px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:Tahoma,sans-serif;outline:none}
.add-inp:focus{border-color:#2563EB}
.add-sub{padding:10px 18px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Tahoma,sans-serif}
.si2{background:#fff;border-radius:12px;padding:13px 16px;border:1.5px solid #E2E8F0;display:flex;align-items:center;gap:9px;margin-bottom:9px}
.si2 span{flex:1;font-size:14px;font-weight:600}
.si2 input{flex:1;padding:6px 10px;border:1.5px solid #2563EB;border-radius:8px;font-size:13px;font-family:Tahoma,sans-serif;outline:none}
.be{background:#EFF6FF;border:none;color:#2563EB;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:11px;font-family:Tahoma,sans-serif}
.bd{background:#FEF2F2;border:none;color:#DC2626;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:11px;font-family:Tahoma,sans-serif}
.realtime-banner{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:10px 14px;font-size:12px;color:#15803D;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.okr-card{background:#fff;border-radius:14px;border:1.5px solid #E2E8F0;padding:14px 16px;margin-bottom:11px}
.okr-title{font-weight:700;font-size:13px;color:#1B3A5C;margin-bottom:6px}
.okr-kr{font-size:12px;color:#374151;margin:5px 0;padding-left:12px;border-left:2px solid #2563EB}
.okr-stat{display:flex;justify-content:space-between;font-size:11px;margin-top:6px}
.goal-input{width:100%;padding:8px 11px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:Tahoma,sans-serif;margin-bottom:8px}
.goal-input:focus{border-color:#2563EB;outline:none}
.period-tabs{display:flex;gap:6px;margin-bottom:14px}
.period-btn{padding:7px 14px;background:#F1F5F9;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#64748B;font-family:Tahoma,sans-serif;transition:all .2s}
.period-btn.active{background:#2563EB;color:#fff}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.gauge-grid{grid-template-columns:repeat(2,1fr)}.metrics-grid{grid-template-columns:repeat(2,1fr)}}
</style>

function tkey(){return new Date().toISOString().slice(0,10);}
function faDate(){return new Date().toLocaleDateString('fa-IR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function pct(v,t){return Math.min(100,Math.round((parseInt(v)||0)/t*100));}
function pColor(p){return p>=100?'#16A34A':p>=60?'#2563EB':p>=30?'#D97706':'#94A3B8';}
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type==='err'?'err':'')+' show';
  clearTimeout(toastT);toastT=setTimeout(()=>el.className='toast',2500);
}

async function loadConfig(){
  try{
    const {data,error}=await db.from('config').select('*').eq('id',1).single();
    if(data && !error){
      CFG={
        experts: data.experts||DEFAULT_EXPERTS,
        fields:  data.fields||DEFAULT_FIELDS,
        okrs: data.okrs||DEFAULT_OKRS
      };
    } else {
      await db.from('config').upsert({id:1, experts:DEFAULT_EXPERTS, fields:DEFAULT_FIELDS, okrs:DEFAULT_OKRS});
    }
  }catch(e){console.log('config load',e);}
}

async function saveConfig(){
  await db.from('config').upsert({id:1, experts:CFG.experts, fields:CFG.fields, okrs:CFG.okrs});
}

async function loadReports(){
  try{
    const {data,error}=await db.from('reports').select('*').eq('date',tkey());
    if(data) data.forEach(r=>{ REPORTS[r.eid+'_'+r.date]=r; });
  }catch(e){console.log('reports load',e);}
}

function getReport(eid){
  const k=eid+'_'+tkey();
  if(REPORTS[k]) return REPORTS[k];
  const blank={eid,date:tkey(),crm:false,notes:'',checklist:new Array(10).fill(false),okr_progress:[],savedAt:null};
  CFG.fields.forEach(f=>blank[f.key]='');
  return blank;
}

async function saveReport(eid){
  const r=getReport(eid);
  r.savedAt=new Date().toLocaleTimeString('fa-IR');
  REPORTS[eid+'_'+tkey()]=r;
  const payload={eid,date:tkey(),crm:r.crm,notes:r.notes,checklist:r.checklist,okr_progress:r.okr_progress,savedAt:r.savedAt};
  CFG.fields.forEach(f=>payload[f.key]=r[f.key]||'');
  await db.from('reports').upsert(payload, {onConflict:'eid,date'});
  return r;
}

async function updateField(eid, field, value){
  const r=getReport(eid);
  r[field]=value;
  REPORTS[eid+'_'+tkey()]=r;
  clearTimeout(window['dbT_'+eid]);
  window['dbT_'+eid]=setTimeout(async()=>{
    const payload={eid,date:tkey()};
    payload[field]=value;
    CFG.fields.forEach(f=>payload[f.key]=getReport(eid)[f.key]||'');
    payload.crm=getReport(eid).crm;
    payload.notes=getReport(eid).notes;
    payload.checklist=getReport(eid).checklist;
    payload.okr_progress=getReport(eid).okr_progress;
    await db.from('reports').upsert(payload,{onConflict:'eid,date'});
  },800);
}

function subscribeRealtime(callback){
  db.channel('reports-channel')
    .on('postgres_changes',{event:'*',schema:'public',table:'reports'},(payload)=>{
      if(payload.new && payload.new.date===tkey()){
        REPORTS[payload.new.eid+'_'+payload.new.date]=payload.new;
        callback();
      }
    }).subscribe();
}

function hideAll(){
  ['S_select','S_expert','S_mgr','S_set'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
}

function setApp(html){document.getElementById('app').innerHTML=html;}

function gotoSel(){hideAll();document.getElementById('S_select').style.display='';renderSel();}
function gotoMgr(){hideAll();document.getElementById('S_mgr').style.display='';renderMgr();}
function gotoSet(){hideAll();document.getElementById('S_set').style.display='';swSetTab('E');}

function openExp(eid){
  AE=CFG.experts.find(e=>e.id===eid);
  hideAll();document.getElementById('S_expert').style.display='';
  swTab('R');renderExpHeader();buildForm();buildChecklist();buildOKR();
}

function renderSel(){
  document.getElementById('selDate').textContent=faDate();
  document.getElementById('hDate').textContent=faDate();
  const list=document.getElementById('expList');list.innerHTML='';
  CFG.experts.forEach(e=>{
    const r=getReport(e.id),done=r.checklist.filter(Boolean).length;
    const b=document.createElement('button');b.className='exp-btn';
    b.innerHTML='<span>👤 '+e.name+'</span><span class="ebadge'+(done===10?' done':'')+'">'+ done+'/۱۰ چک‌لیست</span>';
    b.onclick=()=>openExp(e.id);list.appendChild(b);
  });
}

function renderExpHeader(){
  document.getElementById('expGreet').textContent='سلام، '+AE.name+' 👋';
  document.getElementById('expDate').textContent=faDate();
  document.getElementById('hDate').textContent=faDate();
  updCkBadge();
}

function updCkBadge(){
  const r=getReport(AE.id),done=r.checklist.filter(Boolean).length;
  const el=document.getElementById('ckBadge');
  el.textContent=done+'/10';el.style.color=done===10?'#4ADE80':'#FCD34D';
}

function swTab(t){
  ['R','G','C'].forEach(x=>{
    const p=document.getElementById('p'+x);if(p)p.style.display=x===t?'':'none';
    const b=document.getElementById('t'+x);if(b)b.className='tab-btn'+(x===t?' active':'');
  });
}

function buildForm(){
  const r=getReport(AE.id),p=document.getElementById('pR');
  let html='<div class="realtime-banner">🟢 داده‌ها real-time با سرور همگام‌سازی می‌شود</div>';
  html+='<div class="card"><div class="card-head"><h3>📝 ورود اطلاعات روزانه</h3><p>اعداد هر بخش را وارد کنید — خودکار ذخیره می‌شود</p></div><div class="card-body"><div class="form-grid">';
  CFG.fields.forEach(f=>{
    const v=r[f.key]||'',pc=pct(v,f.target),col=pColor(pc);
    html+='<div class="ff"><label>'+f.icon+' '+f.label+' <span style="color:#94A3B8">(هدف: '+f.target+')</span></label>'+
      '<input type="number" min="0" id="inp_'+f.key+'" value="'+v+'" placeholder="۰" oninput="onFCh(\''+f.key+'\')">'+
      '<div class="prow"><span style="color:#64748B">'+(parseInt(v)||0)+'/'+f.target+'</span><span id="pp_'+f.key+'" style="font-weight:700;color:'+col+'">'+pc+'٪</span></div>'+
      '<div class="bwrap"><div class="bfill" id="bf_'+f.key+'" style="background:'+col+';width:'+pc+'%"></div></div></div>';
  });
  html+='</div>';
  html+='<div class="crm-row'+(r.crm?' done':'')+ '" id="crmRow" onclick="togCRM()">'+
    '<div class="cbox'+(r.crm?' on':'')+ '" id="crmBox">'+(r.crm?'✓':'')+'</div>'+
    '<span style="font-size:14px;font-weight:600;color:'+(r.crm?'#16A34A':'#1B3A5C')+'">ثبت اطلاعات در CRM انجام شد</span></div>';
  html+='<label style="display:block;font-size:12px;color:#64748B;margin-bottom:6px">📝 یادداشت / موارد باز برای فردا</label>'+
    '<textarea class="notes-area" id="notesA" rows="3" placeholder="مشتریانی که باید فردا پیگیری شوند..." oninput="onNotes()">'+
    (r.notes||'')+'</textarea>'+
    '<button class="save-btn" onclick="doSave()">💾 ذخیره نهایی گزارش</button>'+
    '<div id="savedM" class="saved-msg" style="'+(r.savedAt?'':'display:none')+'">'+
    (r.savedAt?'✓ آخرین ذخیره: '+r.savedAt:'')+'</div></div></div>';
  html+='<div class="card"><div class="card-body"><div style="font-weight:700;color:#1B3A5C;margin-bottom:11px;font-size:13px">🎯 خلاصه عملکرد امروز</div><div class="kpi-grid" id="ksum"></div></div></div>';
  p.innerHTML=html;buildKpiSum();
}

function onFCh(key){
  const val=document.getElementById('inp_'+key).value;
  const f=CFG.fields.find(x=>x.key===key);
  const pc=pct(val,f.target),col=pColor(pc);
  document.getElementById('bf_'+key).style.cssText='background:'+col+';width:'+pc+'%;height:7px;border-radius:99px';
  document.getElementById('pp_'+key).textContent=pc+'٪';
  document.getElementById('pp_'+key).style.color=col;
  updateField(AE.id,key,val);
  buildKpiSum();
}

function togCRM(){
  const r=getReport(AE.id);r.crm=!r.crm;REPORTS[AE.id+'_'+tkey()]=r;
  const row=document.getElementById('crmRow'),box=document.getElementById('crmBox');
  if(r.crm){row.className='crm-row done';box.className='cbox on';box.textContent='✓';}
  else{row.className='crm-row';box.className='cbox';box.textContent='';}
  updateField(AE.id,'crm',r.crm);
}

function onNotes(){
  const r=getReport(AE.id);r.notes=document.getElementById('notesA').value;
  REPORTS[AE.id+'_'+tkey()]=r;
  updateField(AE.id,'notes',r.notes);
}

async function doSave(){
  const r=getReport(AE.id);
  r.notes=document.getElementById('notesA').value;
  REPORTS[AE.id+'_'+tkey()]=r;
  await saveReport(AE.id);
  const m=document.getElementById('savedM');
  m.style.display='';m.textContent='✓ آخرین ذخیره: '+getReport(AE.id).savedAt;
  toast('گزارش ذخیره شد ✓');
}

function buildKpiSum(){
  const r=getReport(AE.id),el=document.getElementById('ksum');if(!el)return;
  el.innerHTML=CFG.fields.map(f=>{
    const pc=pct(r[f.key],f.target),col=pColor(pc);
    return '<div class="kpi-box"><div class="ki">'+f.icon+'</div><div class="kv" style="color:'+col+'">'+(parseInt(r[f.key])||0)+'</div><div class="kl">'+f.label+'</div></div>';
  }).join('');
}

function buildOKR(){
  const r=getReport(AE.id),p=document.getElementById('pG');
  let html='<div class="card"><div class="card-head"><h3>🎯 OKR — اهداف کوارتالی</h3><p>پیشرفت هر Objective را ثبت کنید</p></div><div class="card-body">';
  CFG.okrs.forEach((o,oi)=>{
    const prog=r.okr_progress[oi]||0;
    html+='<div class="okr-card">'+
      '<div class="okr-title">'+o.obj+'</div>'+
      '<div style="font-size:12px;color:#64748B;margin-bottom:8px">'+o.krs.map(kr=>'✓ '+kr).join('<br>')+'</div>'+
      '<div class="okr-stat">'+
      '<input type="number" min="0" max="100" value="'+prog+'" placeholder="پیشرفت ٪" style="width:70px;padding:5px;border:1px solid #2563EB;border-radius:6px" oninput="updOKR('+oi+',this.value)">'+
      '<span style="color:'+pColor(prog)+' ">'+prog+'٪</span>'+
      '</div>'+
      '<div class="bwrap"><div class="bfill" style="background:'+pColor(prog)+';width:'+prog+'%"></div></div>'+
      '</div>';
  });
  html+='</div></div>';
  p.innerHTML=html;
}

function updOKR(oi,val){
  const r=getReport(AE.id);
  if(!r.okr_progress) r.okr_progress=[];
  r.okr_progress[oi]=parseInt(val)||0;
  REPORTS[AE.id+'_'+tkey()]=r;
  updateField(AE.id,'okr_progress',r.okr_progress);
  buildOKR();
}

function buildChecklist(){
  const r=getReport(AE.id),done=r.checklist.filter(Boolean).length,pp=Math.round(done/10*100);
  let html='<div class="ph"><div class="ph-row"><span style="font-weight:700;color:#1B3A5C">پیشرفت امروز</span>'+
    '<span style="font-weight:700;color:#2563EB" id="ckProg">'+done+'/10</span></div>'+
    '<div class="bwrap"><div class="bfill" id="ckBar" style="background:'+(done===10?'#22C55E':'linear-gradient(90deg,#1B3A5C,#2563EB)')+';width:'+pp+'%"></div></div></div>';
  CHECK_ITEMS.forEach((item,i)=>{
    html+='<div class="ci'+(r.checklist[i]?' done':'')+ '" onclick="togCk('+i+')" >'+
      '<div class="cbox'+(r.checklist[i]?' on':'')+' ">'+(r.checklist[i]?'✓':'')+'</div>'+
      '<span>'+item+'</span></div>';
  });
  if(done===10) html+='<div class="success-box"><div style="font-size:34px;margin-bottom:5px">🎉</div><div style="font-weight:700;color:#16A34A;font-size:15px">آفرین! روز موفقی داشتید</div></div>';
  document.getElementById('pC').innerHTML=html;
}

async function togCk(i){
  const r=getReport(AE.id);r.checklist[i]=!r.checklist[i];
  REPORTS[AE.id+'_'+tkey()]=r;
  buildChecklist();updCkBadge();
  await updateField(AE.id,'checklist',r.checklist);
}

let mgrTab='G';
function swMgrTab(t){
  mgrTab=t;
  ['G','T'].forEach(x=>{
    document.getElementById('m'+x).style.display=x===t?'':'none';
    document.getElementById('mt'+x).className='tab-btn'+(x===t?' active':'');
  });
}

function renderMgr(){
  document.getElementById('mgrDate').textContent=faDate();
  document.getElementById('hDate').textContent=faDate();
  const tP=CFG.experts.reduce((s,e)=>s+(parseInt(getReport(e.id).panels)||0),0);
  const tC=CFG.experts.reduce((s,e)=>s+(parseInt(getReport(e.id).calls)||0),0);
  const tD=CFG.experts.filter(e=>getReport(e.id).checklist.filter(Boolean).length===10).length;
  document.getElementById('mgrStats').innerHTML=
    [['کارشناسان',CFG.experts.length],['پنل امروز',tP],['تماس امروز',tC],['چک‌لیست کامل',tD+'/'+CFG.experts.length]]
    .map(x=>'<div class="stat-box"><div class="sv">'+x[1]+'</div><div class="sl">'+x[0]+'</div></div>').join('');
  buildGauges();buildTable();swMgrTab(mgrTab);
}

function buildGauges(){
  const el=document.getElementById('mGauges');let html='';
  CFG.fields.forEach(f=>{
    html+='<div class="chart-wrap"><div class="chart-title">'+f.icon+' '+f.label+' — مقایسه (هدف: '+f.target+')</div>';
    CFG.experts.forEach(e=>{
      const r=getReport(e.id),v=parseInt(r[f.key])||0,pc=pct(v,f.target),col=pColor(pc);
      html+='<div class="bar-chart-row"><div class="bcr-label">'+e.name.split(' ')[0]+'</div>'+
        '<div class="bcr-bar"><div class="bcr-fill" style="background:'+col+';width:'+pc+'%"></div>'+
        '<span class="bcr-val">'+v+'</span></div>'+
        '<div class="bcr-pct" style="color:'+col+'">'+pc+'٪</div></div>';
    });html+='</div>';
  });
  html+='<div class="chart-wrap"><div class="chart-title">✅ وضعیت چک‌لیست تیم</div><div class="gauge-grid">';
  CFG.experts.forEach(e=>{
    const r=getReport(e.id),done=r.checklist.filter(Boolean).length,pc=Math.round(done/10*100),col=pColor(pc);
    html+='<div class="gauge-item">'+drawGauge(pc,col)+'<div style="font-size:10px;color:#64748B;margin-top:4px">'+e.name.split(' ')[0]+'</div><div style="font-size:15px;font-weight:700;color:'+col+'">'+done+'/10</div></div>';
  });
  html+='</div></div>';el.innerHTML=html;
}

function drawGauge(p,color){
  const r=40,circ=Math.PI*r,fill=(p/100)*circ;
  return '<svg width="100" height="64" viewBox="0 0 100 64" style="display:block;margin:0 auto">'+
    '<path d="M10,52 A40,40 0 0,1 90,52" fill="none" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round"/>'+
    '<path d="M10,52 A40,40 0 0,1 90,52" fill="none" stroke="'+color+'" stroke-width="10" stroke-linecap="round"'+
    ' stroke-dasharray="'+fill+' '+circ+'"/>'+
    '<text x="50" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="'+color+'" font-family="Tahoma">'+p+'٪</text></svg>';
}

function buildTable(){
  const el=document.getElementById('mTable');let html='';
  CFG.experts.forEach(e=>{
    const r=getReport(e.id),done=r.checklist.filter(Boolean).length;
    let metrics='';
    CFG.fields.forEach(f=>{
      const v=parseInt(r[f.key])||0,pc=pct(v,f.target),col=pColor(pc);
      metrics+='<div class="mc"><div class="ml">'+f.icon+' '+f.label+'</div><div class="mv" style="color:'+col+'">'+v+'</div>'+
        '<div class="mt">هدف: '+f.target+'</div>'+
        '<div class="bwrap" style="margin-top:3px"><div class="bfill" style="background:'+col+';width:'+pc+'%"></div></div></div>';
    });
    html+='<div class="exp-card"><div class="ech"><div style="display:flex;align-items:center;gap:9px">'+
      '<div class="avatar">'+e.name[0]+'</div>'+
      '<div><div class="en">'+e.name+'</div><div class="es">'+(r.savedAt?'آخرین ذخیره: '+r.savedAt:'هنوز ذخیره نشده')+'</div></div></div>'+
      '<span class="ebadge'+(done===10?' done':'')+' ">'+done+'/۱۰</span></div>'+
      '<div class="metrics-grid">'+metrics+'</div>'+
      (r.notes?'<div class="notes-strip">📝 '+r.notes+'</div>':'')+
      '</div>';
  });
  el.innerHTML=html;
}

let setTab='E';
function swSetTab(t){
  setTab=t;
  document.getElementById('setExperts').style.display=t==='E'?'':'none';
  document.getElementById('setKpi').style.display=t==='K'?'':'none';
  document.getElementById('setOkr').style.display=t==='O'?'':'none';
  document.getElementById('stE').className='tab-btn'+(t==='E'?' active':'');
  document.getElementById('stK').className='tab-btn'+(t==='K'?' active':'');
  document.getElementById('stO').className='tab-btn'+(t==='O'?' active':'');
  if(t==='E')renderSetExp();else if(t==='K')renderSetKpi();else renderSetOkr();
}

function renderSetExp(){
  const el=document.getElementById('setExperts');
  let html='<div class="card" style="margin-bottom:14px"><div class="card-body">'+
    '<div style="font-weight:600;font-size:13px;color:#1B3A5C;margin-bottom:11px">افزودن کارشناس ('+CFG.experts.length+'/10)</div>'+
    '<div class="add-row"><input class="add-inp" id="newNm" placeholder="نام و نام خانوادگی" onkeydown="if(event.key===\'Enter\')addExp()">'+
    '<button class="add-sub" onclick="addExp()">+ افزودن</button></div></div></div>';
  CFG.experts.forEach(e=>{
    html+='<div class="si2" id="si_'+e.id+'"><span>👤 '+e.name+'</span>'+
      '<button class="be" onclick="stEdit('+e.id+')">ویرایش</button>'+
      '<button class="bd" onclick="delExp('+e.id+')">حذف</button></div>';
  });
  el.innerHTML=html;
}

function stEdit(eid){
  const e=CFG.experts.find(x=>x.id===eid),div=document.getElementById('si_'+eid);
  div.innerHTML='<input class="add-inp" id="ei_'+eid+'" value="'+e.name+'" style="flex:1" onkeydown="if(event.key===\'Enter\')doEdit('+eid+')">'+
    '<button class="be" onclick="doEdit('+eid+')">ذخیره</button>';
  document.getElementById('ei_'+eid).focus();
}

async function doEdit(eid){
  const v=document.getElementById('ei_'+eid).value.trim();if(!v)return;
  CFG.experts=CFG.experts.map(e=>e.id===eid?{...e,name:v}:e);
  await saveConfig();renderSetExp();toast('نام ویرایش شد');
}

async function addExp(){
  const nm=document.getElementById('newNm').value.trim();if(!nm)return;
  if(CFG.experts.length>=10){toast('حداکثر ۱۰ کارشناس','err');return;}
  CFG.experts.push({id:Date.now(),name:nm});
  await saveConfig();document.getElementById('newNm').value='';renderSetExp();toast(nm+' اضافه شد');
}

async function delExp(eid){
  CFG.experts=CFG.experts.filter(e=>e.id!==eid);
  await saveConfig();renderSetExp();toast('حذف شد');
}

function renderSetKpi(){
  const el=document.getElementById('setKpi');
  let html='<div class="card"><div class="card-head"><h3>🎯 تنظیم KPI</h3><p>هدف روزانه هر شاخص را تنظیم کنید</p></div><div class="card-body">';
  CFG.fields.forEach((f,i)=>{
    html+='<div class="okr-card"><div style="font-size:12px;font-weight:600;color:#1B3A5C">'+f.icon+' '+f.label+'</div>'+
      '<input type="number" id="kt_'+i+'" value="'+f.target+'" min="1" style="width:70px;padding:6px;border:1px solid #2563EB;border-radius:6px;margin-top:6px" oninput="updKpi('+i+',this.value)">'+
      '</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

function updKpi(i,val){
  CFG.fields[i].target=parseInt(val)||1;
  clearTimeout(window.kpiSaveT);
  window.kpiSaveT=setTimeout(()=>saveConfig(),800);
}

function renderSetOkr(){
  const el=document.getElementById('setOkr');
  let html='<div class="card"><div class="card-head"><h3>🎯 تنظیم OKR</h3><p>اهداف فصلی را تنظیم کنید</p></div><div class="card-body">';
  CFG.okrs.forEach((o,i)=>{
    html+='<div class="okr-card" style="margin-bottom:14px"><label style="font-size:11px;color:#64748B">Objective '+( i+1)+'</label>'+
      '<input class="goal-input" id="o_'+i+'" value="'+o.obj+'" onchange="updOkr('+i+',\'obj\',this.value)">'+
      '<label style="font-size:11px;color:#64748B">Key Results</label>';
    o.krs.forEach((kr,j)=>{
      html+='<input class="goal-input" value="'+kr+'" onchange="updOkr('+i+',\'kr\','+j+',this.value)">';
    });
    html+='</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

async function updOkr(oi,type,j,val){
  if(type==='obj') CFG.okrs[oi].obj=val;
  else CFG.okrs[oi].krs[j]=val;
  await saveConfig();toast('OKR به‌روزرسانی شد');
}

function shareWA(){
  const url=window.location.href;
  const txt='داشبورد فروش آن‌باکس 🚚\nهر روز صبح این لینک رو باز کن:\n'+url;
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

document.getElementById('hLogo').src='data:image/jpeg;base64,'+LOGO_B64;

async function init(){
  document.getElementById('hDate').textContent=faDate();
  await loadConfig();
  await loadReports();
  document.getElementById('app').innerHTML=`
    <div id="S_select" style="display:none">
      <div class="sel-wrap">
        <div class="sel-hero"><h1>🚚 داشبورد فروش آن‌باکس</h1><p id="selDate"></p></div>

        <button class="act-btn pri" onclick="gotoMgr()">📊 ورود مدیر</button>

      </div>
    </div>
    <div id="S_expert" style="display:none">

          <div><h2 id="expGreet" style="font-size:17px"></h2><div style="font-size:11px;opacity:.7" id="expDate"></div></div>
          <div class="ck-badge"><div class="num" id="ckBadge">0/10</div><div class="lbl">چک‌لیست</div></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="tR" onclick="swTab('R')">📝 گزارش</button>

      <div style="max-width:900px;margin:0 auto;padding:18px 14px">

          <button class="tab-btn" id="mtT" onclick="swMgrTab('T')">📋 جدول</button>
        </div>
        <div id="mGauges"></div>
        <div id="mTable" style="display:none"></div>
      </div>
    </div>
    <div id="S_set" style="display:none">

      <div class="set-wrap">
        <div class="tabs" style="position:static;border-radius:12px;overflow:hidden;margin-bottom:18px">

init().catch(e=>{
  console.error(e);
  document.getElementById('app').innerHTML='<div class="loading"><div style="color:#DC2626;font-size:14px">خطا در اتصال. VPN را بررسی کنید.</div></div>';
});
</script>
