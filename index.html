<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>داشبورد V5 | آن‌باکس</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow-x:hidden}
        body{font-family:Tahoma,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0e27,#1a1a3e);color:#e2e8f0;min-height:100vh}
        
        /* LOGIN */
        .login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f0f23,#1a1a3e)}
        .login-box{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);padding:40px;border-radius:20px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(229,62,62,.1),inset 0 1px 1px rgba(255,255,255,.2);animation:slideUp .6s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .login-logo{text-align:center;font-size:48px;margin-bottom:20px}
        .login-title{text-align:center;font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:30px}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:#e2e8f0}
        .form-input,select{width:100%;padding:12px;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:14px;font-family:Tahoma;background:rgba(255,255,255,.05);color:#e2e8f0;transition:all .2s}
        .form-input:focus,select:focus{outline:none;border-color:#e53e3e;box-shadow:0 0 20px rgba(229,62,62,.3);background:rgba(255,255,255,.1)}
        .login-button{width:100%;padding:12px;background:linear-gradient(135deg,#e53e3e,#dc2626);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(229,62,62,.3)}
        .login-button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(229,62,62,.4)}
        .login-button:active{transform:translateY(0)}
        .login-error{background:rgba(220,38,38,.2);color:#fca5a5;padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;display:none;border:1px solid rgba(220,38,38,.5)}
        
        /* DASHBOARD */
        .dashboard-container{display:flex;min-height:100vh}
        .sidebar{width:250px;background:rgba(17,24,39,.95);backdrop-filter:blur(10px);border-right:2px solid #e53e3e;padding:20px;position:fixed;height:100vh;overflow-y:auto;z-index:1000;transition:transform .3s ease}
        .sidebar.hidden{transform:translateX(-250px)}
        .logo{display:flex;align-items:center;gap:10px;margin-bottom:30px;animation:fadeInDown .6s ease-out}
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
        .logo-text{font-size:14px;font-weight:700;color:#e53e3e}
        .user-info{background:rgba(229,62,62,.1);padding:12px;border-radius:8px;margin-bottom:20px;font-size:12px;border:1px solid rgba(229,62,62,.2)}
        .user-name{font-weight:700;margin-bottom:5px;color:#f1f5f9}
        .logout-btn{width:100%;padding:8px;background:#e53e3e;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;margin-top:10px;transition:all .2s}
        .logout-btn:hover{background:#dc2626}
        .nav-menu{display:flex;flex-direction:column;gap:5px}
        .nav-item{padding:12px 15px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;color:#a0aec0}
        .nav-item:hover{background:rgba(229,62,62,.1);color:#f1f5f9}
        .nav-item.active{background:linear-gradient(135deg,#e53e3e,#dc2626);color:#fff;font-weight:600}
        .main{margin-right:250px;flex:1}
        .header{background:rgba(17,24,39,.95);backdrop-filter:blur(10px);border-bottom:2px solid #1f2937;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .header-title{font-size:18px;font-weight:700;color:#f1f5f9}
        .content{padding:30px;max-width:1600px;margin:0 auto}
        .page{display:none}
        .page.active{display:block}
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.1),inset 0 1px 1px rgba(255,255,255,.1);transition:all .3s}
        .card:hover{background:rgba(255,255,255,.08);border-color:rgba(229,62,62,.2)}
        .card-title{font-size:16px;font-weight:700;margin-bottom:15px;color:#f1f5f9}
        
        /* TABS */
        .tabs{display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,.1);margin-bottom:20px}
        .tab{padding:12px 24px;cursor:pointer;font-weight:600;color:#a0aec0;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
        .tab:hover{color:#f1f5f9}
        .tab.active{color:#e53e3e;border-bottom-color:#e53e3e}
        .tab-content{display:none}
        .tab-content.active{display:block}
        
        /* PIPELINE */
        .pipeline-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:15px;margin-bottom:20px}
        .pipeline-box{background:rgba(255,255,255,.02);backdrop-filter:blur(5px);padding:15px;border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.1);transition:all .2s}
        .pipeline-box:hover{background:rgba(255,255,255,.05);border-color:rgba(229,62,62,.3);transform:translateY(-3px)}
        .pipeline-stage{font-size:12px;color:#a0aec0;margin-bottom:5px}
        .pipeline-count{font-size:24px;font-weight:700;color:#e53e3e}
        .pipeline-percent{font-size:11px;color:#6b7280;margin-top:5px}
        .progress-bar{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:8px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,#e53e3e,#f97316)}
        
        /* TOOLBAR */
        .toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .btn{padding:10px 20px;background:linear-gradient(135deg,#e53e3e,#dc2626);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:Tahoma;transition:all .2s;box-shadow:0 4px 12px rgba(229,62,62,.2)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(229,62,62,.3)}
        .btn:active{transform:translateY(0)}
        .btn.secondary{background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.2)}
        .btn.secondary:hover{background:rgba(255,255,255,.15)}
        .btn.danger{background:#dc2626}
        .btn.danger:hover{background:#b91c1c}
        .btn.success{background:#16a34a}
        .btn.success:hover{background:#15803d}
        .search-box{padding:10px 15px;border:1px solid rgba(255,255,255,.2);border-radius:8px;width:250px;font-family:Tahoma;background:rgba(255,255,255,.05);color:#e2e8f0;transition:all .2s}
        .search-box:focus{outline:none;border-color:#e53e3e;background:rgba(255,255,255,.1);box-shadow:0 0 20px rgba(229,62,62,.2)}
        
        /* MODAL */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0}
        .modal.active{display:flex}
        .modal-content{background:rgba(17,24,39,.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:30px;max-width:1000px;width:95%;margin:20px auto;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.3)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-title{font-size:18px;font-weight:700;color:#f1f5f9}
        .close-btn{font-size:24px;cursor:pointer;background:none;border:none;color:#a0aec0;transition:all .2s}
        .close-btn:hover{color:#f1f5f9}
        .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
        .form-grid.full{grid-template-columns:1fr}
        
        /* TABLE */
        .lead-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:12px}
        .lead-table th{background:rgba(255,255,255,.05);padding:12px;text-align:right;font-weight:700;color:#f1f5f9;border-bottom:2px solid rgba(255,255,255,.1)}
        .lead-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.05);color:#e2e8f0}
        .lead-table tr:hover{background:rgba(229,62,62,.05)}
        .stage-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(229,62,62,.2);color:#fca5a5}
        
        /* INLINE EDIT */
        .inline-select{padding:6px;border:1px solid rgba(229,62,62,.3);border-radius:6px;font-size:11px;width:100%;font-family:Tahoma;background:rgba(255,255,255,.02);color:#e2e8f0;transition:all .2s}
        .inline-select:focus{outline:none;border-color:#e53e3e;background:rgba(229,62,62,.1)}
        
        /* TEAM */
        .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:20px}
        .team-card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);padding:20px;border-radius:10px;text-align:center;transition:all .3s}
        .team-card:hover{background:rgba(255,255,255,.08);border-color:rgba(229,62,62,.3);transform:translateY(-5px)}
        .team-name{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
        .team-role{font-size:12px;color:#a0aec0;margin-bottom:12px}
        
        /* NOTIFICATION */
        .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;padding:12px 24px;border-radius:8px;z-index:9999;font-weight:600;display:none;box-shadow:0 8px 24px rgba(22,163,74,.3);animation:slideDown .4s ease-out}
        .notification.show{display:block}
        .notification.error{background:linear-gradient(135deg,#dc2626,#ef4444)}
        
        /* RESPONSIVE */
        @media(max-width:768px){
            .sidebar{position:fixed;width:100%;height:auto;left:0;top:0;z-index:1001}
            .sidebar.hidden{transform:translateX(-100%)}
            .main{margin-right:0}
            .hamburger{display:block}
            .pipeline-grid{grid-template-columns:repeat(2,1fr)}
            .form-grid{grid-template-columns:1fr}
            .lead-table{font-size:10px}
            .modal-content{width:98%}
            .team-grid{grid-template-columns:1fr}
        }
        
        .hamburger{display:none;position:fixed;top:15px;left:15px;z-index:1002;background:#e53e3e;border:none;color:#fff;width:40px;height:40px;border-radius:8px;cursor:pointer;font-size:20px}
        .hamburger:active
